<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>犯罪係数-Risk Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;

  font-family:
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;
}

body{

  background:
    linear-gradient(
      180deg,
      #050816 0%,
      #0f172a 100%
    );

  color:white;

  min-height:100vh;

  padding:14px;
}

/* =========================
   TITLE
========================= */

h1{

  text-align:center;

  font-size:2rem;

  margin-bottom:18px;

  font-weight:900;

  letter-spacing:2px;

  background:
    linear-gradient(
      90deg,
      #ff00ff,
      #00ffff
    );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

/* =========================
   GRID
========================= */

.dashboard{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

  gap:16px;
}

/* =========================
   CARD
========================= */

.card{

  background:
    rgba(15,23,42,0.88);

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius:22px;

  padding:18px;

  box-shadow:
    0 0 25px rgba(0,255,255,0.08);
}

h2{

  margin-bottom:16px;

  font-size:1.1rem;
}

/* =========================
   INPUTS
========================= */

.input-group{

  margin-bottom:16px;
}

.label-row{

  display:flex;

  justify-content:space-between;

  margin-bottom:8px;

  font-size:14px;

  font-weight:700;
}

.value{

  color:#00ffff;
}

input[type="range"]{

  width:100%;

  height:8px;

  appearance:none;

  border-radius:999px;

  background:
    linear-gradient(
      90deg,
      #ff00ff,
      #00ffff
    );
}

input[type="range"]::-webkit-slider-thumb{

  appearance:none;

  width:22px;
  height:22px;

  border-radius:50%;

  background:white;

  border:3px solid #00ffff;

  cursor:pointer;
}

/* SELECT */

select{

  width:100%;

  padding:12px;

  border-radius:14px;

  border:none;

  background:#111827;

  color:white;

  font-size:14px;
}

/* =========================
   SCORE
========================= */

.score{

  width:170px;
  height:170px;

  margin:auto;

  border-radius:50%;

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:54px;

  font-weight:900;

  color:#ffd166;

  background:
    conic-gradient(
      #ff00ff,
      #00ffff,
      #ff00ff
    );

  margin-bottom:14px;
}

.score-inner{

  width:135px;
  height:135px;

  background:#0f172a;

  border-radius:50%;

  display:flex;

  align-items:center;

  justify-content:center;
}

.risk-label{

  text-align:center;

  font-size:22px;

  font-weight:800;
}

/* =========================
   BUTTON
========================= */

button{

  width:100%;

  padding:15px;

  border:none;

  border-radius:14px;

  background:
    linear-gradient(
      90deg,
      #ff00ff,
      #00ffff
    );

  color:white;

  font-size:15px;

  font-weight:800;

  cursor:pointer;

  margin-top:18px;
}

/* =========================
   AI
========================= */

.ai-box{

  line-height:1.8;

  background:
    rgba(255,255,255,0.04);

  padding:16px;

  border-radius:16px;
}

/* =========================
   HISTORY
========================= */

.history-item{

  background:
    rgba(255,255,255,0.04);

  padding:12px;

  border-radius:14px;

  margin-top:10px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

  .dashboard{

    grid-template-columns:1fr;
  }

}

</style>

</head>

<body>

<h1>RISK ANALYZER</h1>

<div class="dashboard">

  <!-- 入力 -->

  <div class="card">

    <h2>基本情報</h2>

    <div class="input-group">

      <div class="label-row">
        <span>年齢</span>
      </div>

      <select id="age">

        <option value="10">10代</option>
        <option value="20">20代</option>
        <option value="30">30代</option>
        <option value="40">40代</option>
        <option value="50">50代</option>

      </select>

    </div>

    <div class="input-group">

      <div class="label-row">
        <span>性別</span>
      </div>

      <select id="gender">

        <option value="5">男性</option>
        <option value="3">女性</option>
        <option value="4">その他</option>

      </select>

    </div>

    <div class="input-group">

      <div class="label-row">
        <span>血液型</span>
      </div>

      <select id="blood">

        <option value="1">A型</option>
        <option value="2">B型</option>
        <option value="3">O型</option>
        <option value="4">AB型</option>

      </select>

    </div>

    <div class="input-group">

      <div class="label-row">
        <span>星座</span>
      </div>

      <select id="zodiac">

        <option value="1">牡羊座</option>
        <option value="2">牡牛座</option>
        <option value="3">双子座</option>
        <option value="4">蟹座</option>
        <option value="5">獅子座</option>
        <option value="6">乙女座</option>
        <option value="7">天秤座</option>
        <option value="8">蠍座</option>
        <option value="9">射手座</option>
        <option value="10">山羊座</option>
        <option value="11">水瓶座</option>
        <option value="12">魚座</option>

      </select>

    </div>

  </div>

  <!-- スライダー -->

  <div class="card">

    <h2>リスク項目</h2>

    <div id="sliders"></div>

  </div>

  <!-- スコア -->

  <div class="card">

    <h2>総合指数</h2>

    <div class="score">

      <div
        class="score-inner"
        id="score"
      >
        50
      </div>

    </div>

    <div
      class="risk-label"
      id="riskLabel"
    >
      中リスク
    </div>

    <button id="saveBtn">
      保存
    </button>

  </div>

  <!-- AI -->

  <div class="card">

    <h2>AI分析</h2>

    <div
      class="ai-box"
      id="aiComment"
    >

      分析待機中

    </div>

  </div>

  <!-- レーダー -->

  <div class="card">

    <h2>レーダー分析</h2>

    <canvas id="radarChart"></canvas>

  </div>

  <!-- 棒 -->

  <div class="card">

    <h2>要因別分析</h2>

    <canvas id="barChart"></canvas>

  </div>

  <!-- 履歴 -->

  <div class="card">

    <h2>保存履歴</h2>

    <div id="history"></div>

  </div>

</div>

<script>

/* =========================
   PARAMS
========================= */

const riskItems = [

  "経済",
  "教育",
  "家庭",
  "依存",
  "交友",
  "地域",
  "精神",
  "攻撃性"

];

/* =========================
   スライダー生成
========================= */

const sliderArea =
  document.getElementById("sliders");

riskItems.forEach((item,index)=>{

  sliderArea.innerHTML += `

    <div class="input-group">

      <div class="label-row">

        <span>${item}</span>

        <span
          class="value"
          id="value${index}"
        >
          50
        </span>

      </div>

      <input
        type="range"
        min="0"
        max="100"
        value="50"
        id="slider${index}"
      >

    </div>

  `;

});

/* =========================
   CHARTS
========================= */

const radarChart = new Chart(

  document.getElementById("radarChart"),

  {

    type:"radar",

    data:{

      labels:riskItems,

      datasets:[{

        data:new Array(
          riskItems.length
        ).fill(50),

        backgroundColor:
          "rgba(255,0,255,0.2)",

        borderColor:"#00ffff",

        borderWidth:2

      }]

    }

  }

);

const barChart = new Chart(

  document.getElementById("barChart"),

  {

    type:"bar",

    data:{

      labels:riskItems,

      datasets:[{

        data:new Array(
          riskItems.length
        ).fill(50)

      }]

    }

  }

);

/* =========================
   CALC
========================= */

function calculateRisk(){

  let values = [];

  riskItems.forEach((item,index)=>{

    const slider = document.getElementById(
      `slider${index}`
    );

    const val =
      parseInt(slider.value);

    values.push(val);

    document.getElementById(
      `value${index}`
    ).innerText = val;

  });

  /* 基本情報 */

  const age =
    parseInt(
      document.getElementById("age").value
    );

  const gender =
    parseInt(
      document.getElementById("gender").value
    );

  const blood =
    parseInt(
      document.getElementById("blood").value
    );

  const zodiac =
    parseInt(
      document.getElementById("zodiac").value
    );

  let average =

    values.reduce((a,b)=>a+b,0)
    / values.length;

  /* 加算 */

  average +=
    age * 0.2 +
    gender +
    blood * 0.3 +
    zodiac * 0.1;

  average =
    Math.round(average);

  if(average > 100){
    average = 100;
  }

  /* 表示 */

  document.getElementById(
    "score"
  ).innerText = average;

  let label = "";
  let comment = "";

  if(average < 30){

    label = "低リスク";

    comment =
      "安定傾向です。";

  }else if(average < 60){

    label = "中リスク";

    comment =
      "注意要因があります。";

  }else{

    label = "高リスク";

    comment =
      "複数項目で高値です。";

  }

  document.getElementById(
    "riskLabel"
  ).innerText = label;

  document.getElementById(
    "aiComment"
  ).innerText =

    `総合指数 ${average}
    / 100

    AI分析:
    ${comment}`;

  /* 更新 */

  radarChart.data.datasets[0].data =
    values;

  radarChart.update();

  barChart.data.datasets[0].data =
    values;

  barChart.update();

}

/* =========================
   EVENTS
========================= */

riskItems.forEach((item,index)=>{

  document.getElementById(
    `slider${index}`
  ).addEventListener(
    "input",
    calculateRisk
  );

});

document.getElementById("age")
.addEventListener(
  "change",
  calculateRisk
);

document.getElementById("gender")
.addEventListener(
  "change",
  calculateRisk
);

document.getElementById("blood")
.addEventListener(
  "change",
  calculateRisk
);

document.getElementById("zodiac")
.addEventListener(
  "change",
  calculateRisk
);

/* =========================
   SAVE
========================= */

document.getElementById("saveBtn")
.addEventListener(
  "click",
  ()=>{

    const history = JSON.parse(

      localStorage.getItem(
        "riskHistory"
      )

    ) || [];

    history.unshift({

      score:
        document.getElementById(
          "score"
        ).innerText,

      date:
        new Date()
        .toLocaleString()

    });

    localStorage.setItem(

      "riskHistory",

      JSON.stringify(history)

    );

    loadHistory();

  }
);

/* =========================
   HISTORY
========================= */

function loadHistory(){

  const area =
    document.getElementById(
      "history"
    );

  const history = JSON.parse(

    localStorage.getItem(
      "riskHistory"
    )

  ) || [];

  area.innerHTML = "";

  history.forEach(item=>{

    area.innerHTML += `

      <div class="history-item">

        <strong>
          Score:
          ${item.score}
        </strong>

        <br>

        <small>
          ${item.date}
        </small>

      </div>

    `;

  });

}

/* 初期化 */

calculateRisk();

loadHistory();

</script>

</body>
</html>
